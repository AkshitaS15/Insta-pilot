services:
  - type: web
    name: vibecode-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: "bun install && bunx prisma generate"
    startCommand: "bun run start"
    envVars:
      - key: BUN_VERSION
        value: "1.2.2"
      - key: DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: INSTAGRAM_APP_ID
        sync: false
      - key: INSTAGRAM_APP_SECRET
        sync: false
      - key: INSTAGRAM_REDIRECT_URI
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: PORT
        value: 3000
